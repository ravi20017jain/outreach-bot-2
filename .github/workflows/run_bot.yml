name: Run Contact Bot (Multi-Store)

# ----------------------------------------------------------
#  Ye workflow bot ko chalata hai.
#  - Manual: Actions tab -> "Run Contact Bot" -> Run workflow
#  - Auto:   neeche schedule (cron) se roz chalega
# ----------------------------------------------------------

on:
  # Manual trigger (Actions tab se button)
  workflow_dispatch:

  # Auto schedule - roz subah 4:30 UTC = 10:00 AM IST
  # NOTE: cron UTC me hota hai. IST = UTC + 5:30.
  # Gemini 3.1-flash-lite ki 500/day limit hai aur har site pe 2 call
  # (personalize + form-fill) jaati hain, to ek run me ~240 sites tak hi.
  schedule:
    - cron: "30 4 * * *"

# Ek time pe sirf ek hi run - overlap se bachne ke liye
concurrency:
  group: contact-bot-multistore
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub free max 360; safety ke liye 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run contact bot
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          CAPTCHA_API_KEY:  ${{ secrets.CAPTCHA_API_KEY }}
          GOOGLE_SHEET_ID:  ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          python contact_bot_multistore.py

      # Screenshots (before/after submit) ko artifact me save karo
      # taaki run ke baad debug ke liye dekh sako. 7 din tak rakhe jayenge.
      - name: Upload screenshots
        if: always()   # bot fail ho ya pass, screenshots upload karo
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore
